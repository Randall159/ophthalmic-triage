<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Simple Test</title>
</head>
<body>
    <h1>Simple Chat Test</h1>
    <button onclick="testChat()">Send Test Message</button>
    <div id="output"></div>

    <script>
    async function testChat() {
        const output = document.getElementById('output');
        output.innerHTML = 'Sending...';

        try {
            const res = await fetch('http://localhost:8000/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    message: 'My left eye hurts',
                    history: [],
                    currentEmr: null
                })
            });

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let steps = [];

            while (true) {
                const {done, value} = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, {stream: true});
                const lines = buffer.split('\n\n');
                buffer = lines.pop();

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = JSON.parse(line.slice(6));
                        if (data.type === 'step_done') {
                            steps.push(`Step ${data.step}: ${data.agent} - ${data.status}`);
                        }
                        if (data.type === 'done') {
                            steps.push(`DONE: ${data.response.substring(0, 50)}...`);
                        }
                    }
                }
            }

            output.innerHTML = steps.join('<br>');
        } catch (e) {
            output.innerHTML = 'Error: ' + e.message;
        }
    }
    </script>
</body>
</html>
